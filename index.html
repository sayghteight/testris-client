<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧱 TETRISS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== LOBBY SCREEN ===== -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-container">
      <h1 class="logo">🧱 TETRISS</h1>
      <p class="subtitle">Multiplayer Co-op VS Tetris</p>

      <div class="name-input-wrap">
        <input type="text" id="player-name" placeholder="Your name..." maxlength="20" autocomplete="off" />
      </div>

      <div class="lobby-actions">
        <button class="btn btn-primary" id="btn-create">Create Room</button>
        <div class="join-wrap">
          <input type="text" id="room-code-input" placeholder="Room code..." maxlength="5" autocomplete="off" />
          <button class="btn btn-secondary" id="btn-join">Join</button>
        </div>
      </div>

      <div id="lobby-error" class="error-msg hidden"></div>
    </div>
  </div>

  <!-- ===== WAITING ROOM SCREEN ===== -->
  <div id="screen-waiting" class="screen">
    <div class="waiting-container">
      <h2>Room: <span id="room-code-display" class="code-badge"></span></h2>
      <button class="btn btn-ghost btn-sm" id="btn-copy-code">📋 Copy Code</button>

      <div class="teams-grid">
        <div class="team-box team-a">
          <div class="team-label">🟦 Team A</div>
          <div id="team-a-players" class="player-slots"></div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-box team-b">
          <div class="team-label">🟥 Team B</div>
          <div id="team-b-players" class="player-slots"></div>
        </div>
      </div>

      <p class="waiting-hint" id="waiting-hint">Waiting for players... (min 2)</p>
      <div class="waiting-actions">
        <button class="btn btn-ghost" id="btn-switch-team">🔄 Switch Team</button>
        <button class="btn btn-primary" id="btn-start" disabled>Start Game</button>
      </div>
      <div id="spectator-badge" class="hidden spectator-tag">👁 Spectator Mode</div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="screen-game" class="screen">
    <div class="game-layout">

      <!-- Team A Panel -->
      <div class="team-panel team-a-panel">
        <div class="team-header team-a-header">🟦 Team A</div>
        <div id="team-a-stats" class="team-stats"></div>
        <div class="board-wrap">
          <canvas id="canvas-a" width="200" height="400"></canvas>
        </div>
        <div class="next-pieces-row">
          <div class="next-wrap" id="next-a-0">
            <div class="next-label">P1 Next</div>
            <canvas class="next-canvas" width="80" height="80"></canvas>
          </div>
          <div class="next-wrap" id="next-a-1">
            <div class="next-label">P2 Next</div>
            <canvas class="next-canvas" width="80" height="80"></canvas>
          </div>
        </div>
      </div>

      <!-- Center Info -->
      <div class="center-panel">
        <div class="vs-center">VS</div>
        <div id="garbage-indicator-a" class="garbage-bar garbage-a"></div>
        <div id="garbage-indicator-b" class="garbage-bar garbage-b"></div>
        <div class="controls-hint">
          <div class="ctrl-group">
            <strong>P1</strong>
            <span>A/D move</span>
            <span>W rotate</span>
            <span>S soft drop</span>
            <span>Q hard drop</span>
          </div>
          <div class="ctrl-group">
            <strong>P2</strong>
            <span>←/→ move</span>
            <span>↑ rotate</span>
            <span>↓ soft drop</span>
            <span>0 hard drop</span>
          </div>
        </div>
      </div>

      <!-- Team B Panel -->
      <div class="team-panel team-b-panel">
        <div class="team-header team-b-header">🟥 Team B</div>
        <div id="team-b-stats" class="team-stats"></div>
        <div class="board-wrap">
          <canvas id="canvas-b" width="200" height="400"></canvas>
        </div>
        <div class="next-pieces-row">
          <div class="next-wrap" id="next-b-0">
            <div class="next-label">P3 Next</div>
            <canvas class="next-canvas" width="80" height="80"></canvas>
          </div>
          <div class="next-wrap" id="next-b-1">
            <div class="next-label">P4 Next</div>
            <canvas class="next-canvas" width="80" height="80"></canvas>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== GAME OVER SCREEN ===== -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-container">
      <div id="winner-display" class="winner-text"></div>
      <div id="final-scores" class="final-scores"></div>
      <button class="btn btn-primary" id="btn-play-again">Play Again</button>
      <button class="btn btn-ghost" id="btn-back-lobby">Back to Lobby</button>
    </div>
  </div>

  <script src="http://testris-server-o4xiyr-541f00-188-245-113-32.traefik.me/socket.io/socket.io.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
